<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>my-react-site</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      //
      // GitHub Pages doesn't know about client-side routes like /gym-admin.
      // When someone reloads or deep-links to one, GitHub Pages serves THIS
      // file (its 404 page) instead of a real 404. This script rewrites the
      // URL into a query string and redirects to "/", where the script in
      // index.html reverses the transformation and hands the real path back
      // to React Router — so the reload lands on the right screen.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
